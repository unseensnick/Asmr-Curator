name: Build check

on:
  push:
    branches:
      - main
      - "**"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + typecheck + build + tests)
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit npm deps for known CVEs
        working-directory: frontend
        # --audit-level=high filters out low/moderate noise that's common
        # in transient dev deps. CVEs at high/critical are actionable
        # signal; tune by overriding the level here when an upstream
        # advisory needs a temporary hold.
        run: npm audit --audit-level=high

      - name: Format check (Prettier)
        working-directory: frontend
        run: npm run format:check

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build (tsc + Vite)
        working-directory: frontend
        run: npm run build

      - name: Unit tests (vitest)
        working-directory: frontend
        # `--reporter=junit` emits a JUnit XML alongside the default reporter
        # so the report-publisher job picks it up. `--coverage` emits v8
        # coverage (text + html + lcov) into frontend/coverage/ per the
        # vitest.config.ts coverage block. `|| true` is NOT used — a
        # failing test fails this job and the PR check.
        run: npm test -- --reporter=default --reporter=junit --outputFile.junit=test-results.xml --coverage

      - name: Upload frontend test results
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: frontend-test-results
          path: frontend/test-results.xml
          if-no-files-found: warn

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: warn

  backend:
    name: Backend (syntax check + tests)
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install test + lint dependencies
        run: pip install pytest pytest-asyncio pytest-cov "ruff>=0.8.0"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python deps for known CVEs
        # Env mode — scans every installed package (runtime + dev). Exits
        # non-zero on a published CVE matching a pinned version; use
        # `--ignore-vuln <id>` per advisory if a known-safe one shows up.
        run: pip-audit

      - name: Ruff lint
        run: ruff check backend --config backend/pyproject.toml

      - name: Ruff format check
        run: ruff format --check backend --config backend/pyproject.toml

      - name: Syntax check
        run: python -m compileall -q backend

      - name: Unit tests (pytest)
        # `-c backend/pyproject.toml` points pytest at the [tool.pytest.ini_options]
        # block there; the `testpaths` setting picks up backend/tests/.
        # --cov writes coverage data; --cov-config points pytest-cov at
        # the [tool.coverage.*] blocks in backend/pyproject.toml (needed
        # because pytest-cov looks for coverage config in the cwd, not
        # alongside the pytest -c file). --cov-report=xml emits
        # coverage.xml for the artifact + downstream tools; the `term`
        # reporter prints the per-file table to the CI log so a dipping
        # file is visible without downloading the artifact.
        run: pytest -c backend/pyproject.toml --junitxml=backend-test-results.xml --cov --cov-config=backend/pyproject.toml --cov-report=xml --cov-report=term

      - name: Check API docs in sync
        # Fails when a backend route exists without a matching row under
        # README's `## API Reference`. Same script you can run locally —
        # see .claude/rules/project-workflow.md.
        run: python scripts/check_api_docs.py

      - name: Upload backend test results
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: backend-test-results
          path: backend-test-results.xml
          if-no-files-found: warn

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: warn

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks diffs against the merge base on
          # PRs and the previous SHA on direct pushes. Default
          # fetch-depth=1 only sees the tip commit and misses prior
          # leaks.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-test-results:
    name: Publish JUnit reports
    needs: [frontend, backend]
    if: success() || failure()
    runs-on: ubuntu-latest

    steps:
      - name: Download frontend test results
        uses: actions/download-artifact@v4
        if: success() || failure()
        with:
          name: frontend-test-results
          path: frontend-test-results
        continue-on-error: true

      - name: Download backend test results
        uses: actions/download-artifact@v4
        if: success() || failure()
        with:
          name: backend-test-results
          path: backend-test-results
        continue-on-error: true

      - name: Publish JUnit summary
        uses: mikepenz/action-junit-report@v5
        if: success() || failure()
        with:
          include_passed: true
          detailed_summary: true
          report_paths: |
            frontend-test-results/test-results.xml
            backend-test-results/backend-test-results.xml
