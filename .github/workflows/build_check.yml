name: Build check

on:
  push:
    branches:
      - main
      - "**"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + typecheck + build + tests)
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Format check (Prettier)
        working-directory: frontend
        run: npm run format:check

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build (tsc + Vite)
        working-directory: frontend
        run: npm run build

      - name: Unit tests (vitest)
        working-directory: frontend
        # `--reporter=junit` emits a JUnit XML alongside the default reporter
        # so the report-publisher job picks it up. `|| true` is NOT used —
        # a failing test fails this job and the PR check.
        run: npm test -- --reporter=default --reporter=junit --outputFile.junit=test-results.xml

      - name: Upload frontend test results
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: frontend-test-results
          path: frontend/test-results.xml
          if-no-files-found: warn

  backend:
    name: Backend (syntax check + tests)
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install test + lint dependencies
        run: pip install pytest pytest-asyncio "ruff>=0.8.0"

      - name: Ruff lint
        run: ruff check backend --config backend/pyproject.toml

      - name: Ruff format check
        run: ruff format --check backend --config backend/pyproject.toml

      - name: Syntax check
        run: python -m compileall -q backend

      - name: Unit tests (pytest)
        # `-c backend/pyproject.toml` points pytest at the [tool.pytest.ini_options]
        # block there; the `testpaths` setting picks up backend/tests/.
        run: pytest -c backend/pyproject.toml --junitxml=backend-test-results.xml

      - name: Check API docs in sync
        # Fails when a backend route exists without a matching row under
        # README's `## API Reference`. Same script you can run locally —
        # see .claude/rules/project-workflow.md.
        run: python scripts/check_api_docs.py

      - name: Upload backend test results
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: backend-test-results
          path: backend-test-results.xml
          if-no-files-found: warn

  publish-test-results:
    name: Publish JUnit reports
    needs: [frontend, backend]
    if: success() || failure()
    runs-on: ubuntu-latest

    steps:
      - name: Download frontend test results
        uses: actions/download-artifact@v4
        if: success() || failure()
        with:
          name: frontend-test-results
          path: frontend-test-results
        continue-on-error: true

      - name: Download backend test results
        uses: actions/download-artifact@v4
        if: success() || failure()
        with:
          name: backend-test-results
          path: backend-test-results
        continue-on-error: true

      - name: Publish JUnit summary
        uses: mikepenz/action-junit-report@v5
        if: success() || failure()
        with:
          include_passed: true
          detailed_summary: true
          report_paths: |
            frontend-test-results/test-results.xml
            backend-test-results/backend-test-results.xml
