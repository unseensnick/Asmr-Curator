name: Release

run-name: Build and release v${{ github.event.inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without "v" prefix, e.g. 1.3.0)'
        required: true
        type: string
      message:
        description: "Optional message shown at the top of release notes"
        default: ""
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, push image, draft release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Clone repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute lowercase image name
        # GHCR rejects uppercase characters in repository names, but
        # ${{ github.repository }} preserves the GitHub repo's case
        # (currently `unseensnick/Asmr-Curator`). Lowercase once here and
        # reuse via env.IMAGE / env.REPO_NAME_LC downstream.
        shell: bash
        run: |
          IMAGE_LC="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "IMAGE=$IMAGE_LC" >> "$GITHUB_ENV"
          echo "REPO_NAME_LC=${IMAGE_LC##*/}" >> "$GITHUB_ENV"

      - name: Setup CHANGELOG parser
        uses: taiki-e/install-action@parse-changelog

      - name: Get changelog
        id: changelog
        shell: bash
        run: |
          # Plain SemVer (major.minor.patch[-pre][+build]) or Unreleased
          VERSION_FORMAT='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z\.-]+)?(\+[0-9A-Za-z\.-]+)?$|^Unreleased$'
          {
            echo "CHANGELOG<<END_OF_FILE"
            parse-changelog CHANGELOG.md "${{ github.event.inputs.version }}" --version-format "$VERSION_FORMAT" \
              || parse-changelog CHANGELOG.md Unreleased --version-format "$VERSION_FORMAT" \
              || echo "No documented changes for this version yet."
            echo ""
            echo "END_OF_FILE"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          # Skip BuildKit's provenance + SBOM attestations. They double the
          # number of untagged manifests shown on the GHCR Versions page
          # without buying anything for a homelab tool that doesn't gate
          # consumers on cosign verification.
          provenance: false
          sbom: false
          tags: |
            ${{ env.IMAGE }}:${{ github.event.inputs.version }}
            ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.event.inputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          body: |
            ${{ github.event.inputs.message }}

            ${{ steps.changelog.outputs.CHANGELOG }}

            ---

            ### Docker image

            ```bash
            docker pull ${{ env.IMAGE }}:${{ github.event.inputs.version }}
            ```

            Image is also tagged `latest`. See the [Packages page](https://github.com/${{ github.repository }}/pkgs/container/${{ env.REPO_NAME_LC }}) for digests.

            ### Browser extension

            Run the [Release Extension](https://github.com/${{ github.repository }}/actions/workflows/release-extension.yml) workflow (extension version + `v${{ github.event.inputs.version }}` as the release tag) to attach the companion zip here. The extension is versioned independently — see `extension/CHANGELOG.md`. The two workflows are independent: a failure in one doesn't block the other.
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
