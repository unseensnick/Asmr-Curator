<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ASMR Curator Companion</title>
    <style>
      :root {
        color-scheme: dark;
        --background: oklch(0.155 0.015 265);
        --card: oklch(0.198 0.018 265);
        --popover: oklch(0.225 0.022 265);
        --muted: oklch(0.228 0.016 265);
        --accent: oklch(0.300 0.035 195);
        --accent-foreground: oklch(0.870 0.045 195);
        --primary: oklch(0.55 0.09 195);
        --primary-foreground: oklch(0.965 0.012 85);
        --foreground: oklch(0.918 0.012 85);
        --muted-foreground: oklch(0.690 0.018 85);
        --border: oklch(0.918 0.012 85 / 13%);
        --success: oklch(0.70 0.12 150);
        --destructive: oklch(0.64 0.16 30);
        --warning: oklch(0.78 0.13 70);
        --ring: oklch(0.55 0.09 195 / 55%);
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI Variable",
          "Segoe UI", Roboto, system-ui, sans-serif;
        --font-mono: ui-monospace, "JetBrains Mono", "SF Mono",
          Menlo, Consolas, monospace;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-width: 340px;
        max-width: 380px;
        font: 400 0.8125rem/1.55 var(--font-sans);
        background: var(--background);
        color: var(--foreground);
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.875rem 1rem;
      }
      .wordmark {
        font-size: 0.8125rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--foreground);
      }
      .wordmark .dim { color: var(--muted-foreground); font-weight: 400; }
      header a {
        font-size: 0.8125rem;
        color: var(--muted-foreground);
        text-decoration: none;
        transition: color 0.12s ease;
      }
      header a:hover { color: var(--foreground); }
      header a:focus-visible {
        outline: 2px solid var(--ring);
        outline-offset: 2px;
        border-radius: 0.25rem;
      }

      .update-banner {
        display: none;
        margin: 0 1rem 0.75rem;
        padding: 0.625rem 0.75rem 0.625rem 0.875rem;
        border-radius: 0.5rem;
        background: var(--accent);
        color: var(--accent-foreground);
        font-size: 0.8125rem;
        line-height: 1.45;
        position: relative;
      }
      .update-banner.show { display: block; }
      .update-banner::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0.625rem;
        bottom: 0.625rem;
        width: 2px;
        border-radius: 999px;
        background: var(--primary);
      }
      .update-banner-row {
        display: flex;
        align-items: baseline;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      .update-banner-label {
        font-size: 0.6875rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent-foreground);
        opacity: 0.85;
      }
      .update-banner-version {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
        color: var(--foreground);
      }
      .update-banner-meta {
        margin-top: 0.125rem;
        font-size: 0.75rem;
        color: var(--muted-foreground);
        font-family: var(--font-mono);
      }
      .update-banner a {
        display: inline-block;
        margin-top: 0.375rem;
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--primary);
        text-decoration: none;
      }
      .update-banner a:hover { text-decoration: underline; }
      .update-banner a:focus-visible {
        outline: 2px solid var(--ring);
        outline-offset: 2px;
        border-radius: 0.25rem;
      }

      section { padding: 0 1rem 1rem; }
      .eyebrow {
        display: block;
        font-size: 0.6875rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted-foreground);
        margin: 0 0 0.5rem;
      }

      button.primary {
        appearance: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        width: 100%;
        height: 2.5rem;
        font: 500 0.875rem/1 var(--font-sans);
        padding: 0 1rem;
        border-radius: 1.625rem;
        cursor: pointer;
        background: var(--primary);
        color: var(--primary-foreground);
        border: 1px solid var(--primary);
        transition: filter 0.12s ease, transform 0.12s ease;
      }
      button.primary:hover { filter: brightness(1.06); }
      button.primary:active { transform: translateY(1px); }
      button.primary:focus-visible {
        outline: 2px solid var(--ring);
        outline-offset: 2px;
      }
      button.primary:disabled {
        background: var(--muted);
        color: var(--muted-foreground);
        border-color: transparent;
        cursor: not-allowed;
        filter: none;
        transform: none;
      }

      .status {
        font-size: 0.8125rem;
        line-height: 1.55;
        color: var(--muted-foreground);
        margin: 0.75rem 0 0;
        min-height: 1.1rem;
      }
      .status.ok    { color: var(--success); }
      .status.err   { color: var(--destructive); }
      .status code {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        background: var(--muted);
        color: var(--foreground);
        padding: 0.05rem 0.3rem;
        border-radius: 0.25rem;
      }

      @media (prefers-reduced-motion: reduce) {
        button.primary, header a { transition: none; }
        button.primary:active { transform: none; }
      }
    </style>
  </head>
  <body>
    <header>
      <span class="wordmark">ASMR Curator <span class="dim">· Companion</span></span>
      <a id="options-link" href="#">Settings</a>
    </header>

    <div id="update-banner" class="update-banner" role="status" aria-live="polite">
      <div class="update-banner-row">
        <span class="update-banner-label">Update available</span>
        <span id="update-banner-version" class="update-banner-version"></span>
      </div>
      <div id="update-banner-meta" class="update-banner-meta"></div>
      <a id="update-banner-link" href="#" target="_blank" rel="noopener noreferrer">View release →</a>
    </div>

    <section>
      <span class="eyebrow">Session cookies</span>
      <button id="sync-cookie" class="primary">Sync Patreon + Google cookies</button>
      <p id="cookie-status" class="status">
        Pushes your current Patreon and Google cookies to the backend so
        patreon-dl and the Drive scrape can authenticate. Log in to both
        sites first.
      </p>
    </section>

    <script src="popup.js"></script>
  </body>
</html>
