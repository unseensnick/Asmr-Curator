<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ASMR Workbench Companion</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f0f12;
        --panel: #18181d;
        --border: #2a2a31;
        --text: #f4f4f5;
        --muted: #9a9aa3;
        --accent: #a78bfa;
        --accent-strong: #7c3aed;
        --success: #22c55e;
        --error: #ef4444;
      }
      body {
        margin: 0;
        min-width: 360px;
        max-width: 360px;
        font: 400 12px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
      }
      header h1 {
        margin: 0;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      header a {
        color: var(--muted);
        font-size: 11px;
        text-decoration: none;
      }
      header a:hover { color: var(--text); }
      section { padding: 12px; border-bottom: 1px solid var(--border); }
      section:last-child { border-bottom: none; }
      .section-title {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0 0 8px;
      }
      button.primary, button.secondary {
        appearance: none;
        font: inherit;
        font-weight: 500;
        padding: 8px 12px;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
        transition: background 0.12s ease, border-color 0.12s ease;
      }
      button.primary {
        background: var(--accent-strong);
        color: #fff;
        border: 1px solid var(--accent-strong);
      }
      button.primary:hover { background: #6d28d9; }
      button.primary:disabled { background: #3b3b44; border-color: #3b3b44; cursor: not-allowed; }
      button.secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }
      button.secondary:hover { border-color: var(--accent); color: var(--accent); }
      .status { font-size: 11px; color: var(--muted); margin-top: 6px; min-height: 14px; }
      .status.ok    { color: var(--success); }
      .status.err   { color: var(--error); }
      .capture {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 8px;
        padding: 8px 10px;
        margin-bottom: 8px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .capture:last-child { margin-bottom: 0; }
      .capture-meta {
        display: flex;
        justify-content: space-between;
        font-size: 10px;
        color: var(--muted);
      }
      .capture-url {
        font: 11px/1.35 ui-monospace, SFMono-Regular, Menlo, monospace;
        word-break: break-all;
        color: var(--muted);
        max-height: 3.6em;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .capture-controls {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .capture-controls input {
        flex: 1;
        font: inherit;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
      }
      .capture-controls input::placeholder { color: var(--muted); }
      .capture-controls button {
        font: 500 11px/1 inherit;
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid var(--accent);
        background: transparent;
        color: var(--accent);
        cursor: pointer;
      }
      .capture-controls button:hover { background: rgba(167, 139, 250, 0.12); }
      .empty {
        font-size: 11px;
        color: var(--muted);
        font-style: italic;
        text-align: center;
        padding: 8px 0;
      }
      .row { display: flex; gap: 8px; }
      .row > * { flex: 1; }
    </style>
  </head>
  <body>
    <header>
      <h1>ASMR Workbench</h1>
      <a id="options-link" href="#">Settings</a>
    </header>

    <section>
      <p class="section-title">Session cookies</p>
      <button id="sync-cookie" class="primary">Sync Patreon + Google cookies</button>
      <p id="cookie-status" class="status">
        Sends current Patreon and Google cookies to the backend so patreon-dl
        and the Drive scrape can authenticate. Log into both sites first.
      </p>
    </section>

    <section>
      <div class="row" style="align-items: center; margin-bottom: 8px;">
        <p class="section-title" style="margin: 0;">Captured audio</p>
        <button id="clear-captures" class="secondary" style="flex: 0; width: auto; padding: 4px 10px; font-size: 10px;">
          Clear
        </button>
      </div>
      <div id="captures-list"></div>
      <p id="captures-status" class="status"></p>
    </section>

    <script src="lib/url-clean.js"></script>
    <script src="lib/post-id.js"></script>
    <script src="lib/storage.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
